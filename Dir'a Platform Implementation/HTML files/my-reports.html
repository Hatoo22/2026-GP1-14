<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>My Reports</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="page">

        <!-- Navbar -->
        <nav class="nav">
            <a href="main-home.html" class="logo logo-switch">
  <img src="images/black-logo.png" class="logo-light">
  <img src="images/white-logo.png" class="logo-dark">
</a>
            <div class="links">
                <a href="home.html">Home</a>
                <a href="games.html">Games</a>
                <a class="active" href="my-reports.html">Reports</a>
                <a href="tracked-games.html">My List</a>
                <a class="btn" href="main-home.html">Log Out</a>
                <button onclick="toggleTheme()" class="icon">🌙</button>
                <a class="icon profileIcon" href="profile.html">👤</a>
            </div>
        </nav>

        <!-- Content -->
        <section class="section">
            <h1 style="font-size:32px">My Reports</h1>

            <div class="tableWrap animate">
                <table>
                    <thead>
                        <tr>
                            <th>Game</th>
                            <th>Title</th>
                            <th>Description</th>
                            <th>Date Reported</th>
                            <th>Status</th>
                        </tr>
                    </thead>

                    <tbody id="reportsBody">
                        <!-- Loading state -->
                        <tr>
                            <td colspan="5" style="text-align:center; opacity:.6;">
                                Loading reports...
                            </td>
                        </tr>
                    </tbody>

                </table>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <h3 class="footer-logo logo-switch">
  <img src="images/black-logo.png" alt="Dir Logo" class="logo-light">
  <img src="images/white-logo.png" alt="Dir Logo" class="logo-dark">
</h3>
            <div class="social">○ □ △ ×</div>
            <p class="mini">
  <a href="about.html">About Us</a>
</p>
        </footer>

    </main>

    <script src="js/common.js"></script>
    <script src="js/my-reports.js"></script>

</body>

</html>
